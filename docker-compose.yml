x-storefront-env: &storefront-env
  API_BASE_URL: ${API_BASE_URL:-https://vendra.test/v1}
  STORAGE_BASE_URL: ${STORAGE_BASE_URL:-https://vendra.test}
  NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://vendra.test/v1}
  NEXT_PUBLIC_STORAGE_BASE_URL: ${NEXT_PUBLIC_STORAGE_BASE_URL:-https://vendra.test}
  NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://houshang-flowers.com}
  CONTACT_MOBILE_PHONE: ${CONTACT_MOBILE_PHONE:-0912-9333034}
  CONTACT_OFFICE_PHONE: ${CONTACT_OFFICE_PHONE:-021-22011507}
  CONTACT_HOURS_OPEN: ${CONTACT_HOURS_OPEN:-08:00}
  CONTACT_HOURS_CLOSE: ${CONTACT_HOURS_CLOSE:-21:00}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ALPINE_MIRROR: ${ALPINE_MIRROR:-https://mirror.arvancloud.ir/alpine}
        API_BASE_URL: ${API_BASE_URL:-https://vendra.test/v1}
        STORAGE_BASE_URL: ${STORAGE_BASE_URL:-https://vendra.test}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://vendra.test/v1}
        NEXT_PUBLIC_STORAGE_BASE_URL: ${NEXT_PUBLIC_STORAGE_BASE_URL:-https://vendra.test}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://houshang-flowers.com}
    environment: *storefront-env
    extra_hosts:
      - "vendra.test:host-gateway"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
